# Block 5.3 + 5.3b — Curriculum & Batch training config
# Used by CurriculumManager and BatchLevelSampler in curriculum_batch_manager.py
# Level definitions (map + traffic) are in levels.yaml (Block 5.2).

curriculum:
  levels: ["easy", "medium", "hard"]
  promotion_threshold: 0.45      # Run v4 0.48 -> 0.45 # Run v3 0.6 -> 0.48 # min window SR to promote
  collision_threshold: 0.30      # Run v4 0.36 -> 0.30 # Run v3 0.3 -> 0.36 # max window CR to promote
  min_episodes: 50               # min episodes on level before check
  min_timesteps: 200000          # min timesteps on level before check
  replay_ratio: 0.05              # fraction of episodes replaying earlier levels
  max_blocks_without_replay: 6   # forced replay after N consecutive non-replay blocks
  window_size: 50                # episode tracker sliding window
  level_criteria:                # per-level promotion overrides
    easy:
      min_timesteps: 500000      # Finetuning Run v5 100k -> 500k 
    medium:
      min_timesteps: 1500000     # Finetuning Run v5 500k -> 1.5M

batch:
  levels: ["easy", "medium", "hard"]
  window_size: 3                 # K=3 stratified window
  seed: 42                       # shuffle seed for reproducibility

# Conservative hyperparams for multi-level to prevent NaN from distribution shift
# Aligned with train_mappo.yaml G2 values — kept for explicit multi-level control
# optimization_overrides:
#   num_sgd_iter: 15              # Run v2 10 -> 15 #  Run v1 15 -> 10 # For batch and curriculum
#   lr: 0.0005                    # Run v2 0.0003 -> 0.0005 # 0.0005 ->  Run v1 0.0003 # For batch and curriculum