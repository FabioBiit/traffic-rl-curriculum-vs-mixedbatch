# Block 5.3 + 5.3b — Curriculum & Batch training config
# Used by CurriculumManager and BatchLevelSampler in curriculum_batch_manager.py
# Level definitions (map + traffic) are in levels.yaml (Block 5.2).

curriculum:
  levels: ["easy", "medium", "hard"]
  # success_rate_threshold: 0.45 # default competence SR for unlock checks
  # collision_threshold: 0.20    # default competence CR ceiling for unlock checks
  min_episodes: 50               # minimum episode support before any unlock
  window_size: 50                # episode tracker sliding window
  unlock_criteria:
    medium:
      success_rate_threshold: 0.50          # soft medium unlocks when easy SR >= 50%
      collision_rate_threshold: 0.20        # CR must be <= 20% for medium unlock checks
      min_budget_share: 0.12                # easy share required before medium can unlock
      force_unlock_global_share_cap: 0.20   # force unlock by 20% of total budget if CR stays acceptable
    hard:
      success_rate_threshold: 0.40          # soft hard unlocks when medium SR >= 40%
      collision_rate_threshold: 0.30        # CR must be <= 30% for hard unlock checks (allow higher CR for hard unlock)
      min_budget_share: 0.16                # medium share required before hard can unlock
      force_unlock_global_share_cap: 0.35   # force unlock by 35% of total budget if CR stays acceptable
  budget_constraints:
    easy_max_share: 0.25         # easy cannot exceed 25% once medium is available
    medium_max_share: 0.35       # medium cannot monopolize post-hard training
    hard_min_share: 0.45         # dynamic hard floor over the total budget
  base_sampling_weights:
    easy: 1.00
    medium: 1.20
    hard: 1.40
  probation_sampling_weights:
    medium: 1.00
    hard: 1.35
  probation_blocks_after_unlock: 2
  probation_blocks_after_cap_pressure: 1

batch:
  levels: ["easy", "medium", "hard"]

# Conservative hyperparams for multi-level to prevent NaN from distribution shift
# Aligned with train_mappo.yaml G2 values — kept for explicit multi-level control
