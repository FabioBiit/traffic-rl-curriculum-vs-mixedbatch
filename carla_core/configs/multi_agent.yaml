# Multi-agent CARLA configuration
# Controls RL agents (vehicles + pedestrians), NPC traffic, and episode rules. #

simulator:
  host: "127.0.0.1"             # CARLA server host.
  port: 2000                    # CARLA server TCP port.
  traffic_manager_port: 8000    # Traffic Manager port for this CARLA session.
  timeout_seconds: 20.0         # Client timeout for connect/tick operations.
  sync_mode: true               # REQUIRED: must be true for RL training. Async mode not supported.
  fixed_delta_seconds: 0.05     # Fixed physics step (20 FPS simulation).

world:
  map: "Town03"
  weather_preset: "ClearNoon"
  no_rendering: true

agents:
  n_vehicles_rl: 3               # RL-controlled vehicles
  n_pedestrians_rl: 3            # RL-controlled pedestrians
  vehicle_blueprint: "vehicle.audi.etron"
  pedestrian_blueprint: "walker.pedestrian.*"

traffic:
  enabled: true
  n_vehicles_npc: 10             # Autopilot NPC vehicles
  n_pedestrians_npc: 10          # AI-controlled NPC pedestrians
  seed: 42
  persist_traffic: true

episode:
  max_steps: 1000
  route_length_vehicle: 15                  # Waypoints for vehicle route # 10 -> 15 Reward v6 # 10 -> 15, spacing 2.0m = ~30m route # 50 -> 10 Reward v5# 10 -> 15, spacing 5.0m = ~50m route
  route_length_pedestrian: 10               # Waypoints for pedestrian route (Sidewalk waypoints)
  terminate_on_collision: true              # End episode when collision occurs.
  terminate_on_offroad: true                # End episode when ego leaves drivable road.
  terminate_on_route_completion: true       # End episode when route is completed.
  route_distance_m: null                    # Block 5.1: A* vehicle route by meters (null = legacy wp chain)
  route_distance_m_pedestrian: null         # Block 5.1: sidewalk route by meters (null = legacy wp count)
  levels_config: "carla_core/configs/levels.yaml" # Block 5.2: level definitions loaded from levels.yaml # Override here or pass via env_config["levels"] for programmatic use.

observation:
  vehicle_nearby_radius_m: 60.0             # Radius for appended vehicle-local awareness.
  pedestrian_nearby_radius_m: 40.0          # Radius for vehicle -> pedestrian awareness.
  occupancy_radius_vehicle_m: 15.0          # Front-local static occupancy radius for vehicles.
  occupancy_radius_pedestrian_m: 8.0        # Front-local static occupancy radius for pedestrians.
  n_occ_sectors: 6                          # Must stay aligned with compiled obs dims.
  enable_vehicle_pedestrian_obs: true       # Append nearby pedestrian slots to vehicle obs.
  enable_static_occupancy: true             # Append binary occupancy sectors to both agent types.

safety:
  enable_controlled_brake: true             # TTC-based brake/steer guard for vehicles.
  ttc_trigger_s: 1.5                        # Hazard trigger threshold.
  ttc_horizon_m: 25.0                       # Search horizon for dynamic hazard anticipation.
  max_brake: 0.85                           # Brake cap injected by safety guard.
  steer_damping: 0.50                       # Steer damping under hazard.
