# carla_core/configs/train.yaml
experiment:
  name: "carla_g1_smoke"
  output_dir: "carla_core/experiments"
  seed: 42
  device: "cuda"                # cpu | cuda

algorithm:
  name: "ppo"                   # ppo | mappo (future)
  framework: "rllib"

resources:
  num_workers: 1
  num_gpus: 1
  num_envs_per_worker: 1
  num_cpus_for_driver: 1

rollout:
  rollout_fragment_length: 200
  train_batch_size: 4000
  sgd_minibatch_size: 256
  num_sgd_iter: 10

optimization:
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_param: 0.2
  entropy_coeff: 0.01
  vf_loss_coeff: 0.5
  grad_clip: 0.5

schedule:
  total_timesteps: 200000
  checkpoint_freq: 20000
  eval_freq: 10000
  stop_on_nan: true

logging:
  tensorboard: true
  wandb: false
  log_level: "INFO"

reproducibility:
  deterministic_cudnn: false
  torch_deterministic_algorithms: false
