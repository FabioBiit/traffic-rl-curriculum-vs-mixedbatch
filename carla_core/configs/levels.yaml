# Block 5.2 — Curriculum level definitions (Design B)
# Each level = map + traffic combo + route distance.
# Used by set_level() in CarlaMultiAgentEnv.

levels:
  easy:
    map: "Town01"
    n_vehicles_npc: 5
    n_pedestrians_npc: 10
    route_distance_m: 50
    route_distance_m_pedestrian: 25

  medium:
    map: "Town03"
    n_vehicles_npc: 15
    n_pedestrians_npc: 30
    route_distance_m: 120
    route_distance_m_pedestrian: 50

  hard:
    map: "Town05"
    n_vehicles_npc: 30
    n_pedestrians_npc: 60
    route_distance_m: 250
    route_distance_m_pedestrian: 80

  test:
    maps: ["Town02", "Town10"]     # random pick per episode
    n_vehicles_npc: 15
    n_pedestrians_npc: 30
    route_distance_m: 120
    route_distance_m_pedestrian: 50