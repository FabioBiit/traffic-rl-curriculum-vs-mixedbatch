# Block 5.2 — Curriculum level definitions (Design B revised)
# Training levels: traffic + route difficulty on fixed map (Town03).
# Map-based generalization tested in final eval (subprocess isolation).
# Rationale: CARLA 0.9.16 load_world SIGABRT on Windows prevents
# in-process map switching during training.

levels:
  easy:
    map: "Town03"
    n_vehicles_npc: 5
    n_pedestrians_npc: 10
    route_distance_m: 50
    route_distance_m_pedestrian: 25

  medium:
    map: "Town03"
    n_vehicles_npc: 15
    n_pedestrians_npc: 30
    route_distance_m: 120
    route_distance_m_pedestrian: 50

  hard:
    map: "Town03"
    n_vehicles_npc: 30
    n_pedestrians_npc: 60
    route_distance_m: 250
    route_distance_m_pedestrian: 80

  test:
    maps: ["Town02", "Town10"]     # eval only — subprocess isolation
    n_vehicles_npc: 15
    n_pedestrians_npc: 30
    route_distance_m: 120
    route_distance_m_pedestrian: 50