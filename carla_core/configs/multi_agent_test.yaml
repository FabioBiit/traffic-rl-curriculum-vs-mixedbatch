# Multi-agent CARLA configuration
# Controls RL agents (vehicles + pedestrians), NPC traffic, and episode rules.

simulator:
  host: "127.0.0.1"             # CARLA server host.
  port: 2000                    # CARLA server TCP port.
  traffic_manager_port: 8000    # Traffic Manager port for this CARLA session.
  timeout_seconds: 20.0         # Client timeout for connect/tick operations.
  sync_mode: true               # REQUIRED: must be true for RL training. Async mode not supported.
  fixed_delta_seconds: 0.05     # Fixed physics step (20 FPS simulation).

world:
  map: "Town05"                 # CARLA MAP FOR TEST
  weather_preset: "ClearNoon"
  no_rendering: true

agents:
  n_vehicles_rl: 3               # RL-controlled vehicles
  n_pedestrians_rl: 3            # RL-controlled pedestrians
  vehicle_blueprint: "vehicle.mercedes.coupe"
  pedestrian_blueprint: "walker.pedestrian.*"

traffic:
  enabled: true
  n_vehicles_npc: 10             # Autopilot NPC vehicles
  n_pedestrians_npc: 10          # AI-controlled NPC pedestrians
  seed: 42
  persist_traffic: true

episode:
  max_steps: 1000
  route_length_vehicle: 15                  # Waypoints for vehicle route # 10 -> 15 Reward v6 # 10 -> 15, spacing 2.0m = ~30m route # 50 -> 10 Reward v5# 10 -> 15, spacing 5.0m = ~50m route
  route_length_pedestrian: 10               # Waypoints for pedestrian route (Sidewalk waypoints)
  terminate_on_collision: true              # End episode when collision occurs.
  terminate_on_offroad: true                # End episode when ego leaves drivable road.
  terminate_on_route_completion: true       # End episode when route is completed.
