# carla_core/configs/env.yaml
simulator:
  host: "127.0.0.1"
  port: 2000
  timeout_seconds: 20.0
  sync_mode: true
  fixed_delta_seconds: 0.05

world:
  map: "Town03"
  weather_preset: "ClearNoon"
  no_rendering: true

traffic:
  enabled: true
  n_vehicles: 40
  n_pedestrians: 80
  seed: 42

ego:
  spawn_mode: "random"          # random | fixed_index
  spawn_index: 0
  blueprint_filter: "vehicle.tesla.model3"
  role_name: "hero"

sensors:
  camera_rgb:
    enabled: false
    width: 84
    height: 84
    fov: 90
    tick: 0.05
  lidar:
    enabled: false
    channels: 32
    range: 50.0
    points_per_second: 56000
    rotation_frequency: 10
  radar:
    enabled: false

wrapper:
  obs_type: "vector"            # vector | rgb | hybrid
  action_type: "continuous"     # continuous | discrete
  frame_stack: 1
  normalize_obs: true

episode:
  max_steps: 1000
  terminate_on_collision: true
  terminate_on_offroad: true
  terminate_on_route_completion: true
