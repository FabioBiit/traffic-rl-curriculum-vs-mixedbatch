# CARLA environment configuration.
# This file controls simulator connection, world setup, traffic, sensors,
# wrapper behavior, and episode termination rules.

simulator:
  host: "127.0.0.1"             # CARLA server host.
  port: 2000                    # CARLA server TCP port.
  timeout_seconds: 20.0         # Client timeout for connect/tick operations.
  sync_mode: true               # True = simulation advances only on explicit tick.
  fixed_delta_seconds: 0.05     # Fixed physics step (20 FPS simulation).

world:
  map: "Town03"                 # CARLA map loaded for the experiment.
  weather_preset: "ClearNoon"   # Weather preset used in the world.
  no_rendering: true            # Disable rendering for faster headless runs.

traffic:
  enabled: true                 # Enable NPC traffic and pedestrians.
  n_vehicles: 40                # Number of NPC vehicles to spawn.
  n_pedestrians: 80             # Number of pedestrians to spawn.
  seed: 42                      # Seed for deterministic traffic generation.

ego:
  spawn_mode: "random"          # random | fixed_index
  spawn_index: 0                # Spawn point index when spawn_mode=fixed_index.
  blueprint_filter: "vehicle.tesla.model3"  # Ego vehicle blueprint filter.
  role_name: "hero"             # Actor role name for the ego vehicle.

sensors:
  camera_rgb:
    enabled: false              # Enable RGB camera sensor.
    width: 84                   # Camera image width in pixels.
    height: 84                  # Camera image height in pixels.
    fov: 90                     # Camera field of view in degrees.
    tick: 0.05                  # Sensor update period in seconds.
  lidar:
    enabled: false              # Enable LiDAR sensor.
    channels: 32                # Number of LiDAR channels.
    range: 50.0                 # Maximum LiDAR range in meters.
    points_per_second: 56000    # Total points generated per second.
    rotation_frequency: 10      # LiDAR rotation frequency in Hz.
  radar:
    enabled: false              # Enable radar sensor.

wrapper:
  obs_type: "vector"            # vector | rgb | hybrid observation mode.
  action_type: "continuous"     # continuous | discrete action space.
  frame_stack: 1                # Number of consecutive frames stacked in obs.
  normalize_obs: true           # Apply observation normalization.

episode:
  max_steps: 1000               # Hard cap of steps per episode.
  terminate_on_collision: true  # End episode immediately on collision.
  terminate_on_offroad: true    # End episode when ego leaves drivable road.
  terminate_on_route_completion: true  # End episode when route is completed.
